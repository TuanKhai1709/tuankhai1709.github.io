<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="frame">
    <h1>LOGIN FORM</FORM></FORM></h1>
    <div class="login-container">
        <div class="profile-picture"></div>
        <div class="login-form">
            <div class="avartar">
                <img 
                    src="https://e-learning.ipvietnam.gov.vn/imgs/avatar.png"
                    alt="Avatar" class="avatar-image"
                    style="width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; margin-left:40%; margin-right: 40%;">
            </div>
            <form action="login-form.html" method="post">
                <h3>Username:</h3>
                <div class="input-group">
                    <label for="name"><i class="fas fa-user"></i></label>
                    <input type="text" id="name" name="name" placeholder="Username" autofocus="autofocus" required tabindex="1">
                </div>
                <h3>Password:</h3>
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i></label>
                    <input type="password" id="password" name="password" placeholder="********" tabindex="2" required>
                </div>
                <div class="button">
                    <button type="submit" class="btn btn-primary" tabindex="3">Login</button>
                </div>
            </form>
        </div>
        <footer>
        </footer>
    </div>
</body>
</html>
